# GitHub Pages へ静的ファイルのみデプロイ（node_modules は含めない）
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (exclude node_modules)
        run: |
          mkdir -p _site
          cp index.html style.css script.js service-worker.js manifest.json _site/
          cp image_c68888.jpg _site/
          [ -f icon-192.png ] && cp icon-192.png _site/
          [ -f icon-512.png ] && cp icon-512.png _site/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
